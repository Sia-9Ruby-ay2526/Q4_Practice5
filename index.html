<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Checker</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">

</head>
<body>

    <!--Hero-->
    <div class="container p-4 mt-5 mb-5 rounded contact-form">
        <h1>Password Checker</h1>
        <hr>
        <label> Enter Password:</label>
        <input type="password" id="passkeyPrivate" placeholder="Enter Password">
            <br>
            <p id="checkPass"></p>
    
             <!-- Buttons -->
                <div class="col-12">
                    <button type="button" class="btn btn-danger mt-3" onclick="window.location.reload()">Cancel</button>
                </div>
                <div class="col-12">
                  <button type="button" onclick="checkingPassword()" class="btn btn-primary mt-3">Confirm Password</button>
    </div>
    
    <script src="main.js"></script>
    
</body>
</html>
